<!DOCTYPE html>
<html lang="en">
<head>

    ┌─────────────────────────────────────────────────────────┐
    │  NSL PHARMACY SCHEDULER                                  │
    │  North Star Lodge · Oncology Infusion Clinic             │
    │                                                          │
    │  Single-file browser application. No build tools.        │
    │  Dependencies loaded from CDN only.                      │
    └─────────────────────────────────────────────────────────┘

  <!-- Node.js compatibility shims required by ExcelJS browser build -->
  <script>
    window.global  = window;
    window.process = window.process || { env: {}, version: '', versions: {}, platform: 'browser' };
  </script>

  <!-- Buffer polyfill (required by ExcelJS in browser) -->
  <script src="https://cdn.jsdelivr.net/npm/buffer@6.0.3/index.min.js"></script>
  <script>
    if (typeof window.Buffer === 'undefined') {
      window.Buffer = (typeof buffer !== 'undefined') ? buffer.Buffer : null;
    }
  </script>

  <!-- ExcelJS 4.3.0 browser bundle -->
  <script src="https://cdn.jsdelivr.net/npm/exceljs@4.3.0/dist/exceljs.min.js"></script>

  <!-- Tailwind CSS Play CDN -->

<body class="bg-gray-950 text-gray-100 h-screen flex flex-col overflow-hidden select-none">

  <!-- ═══════════════════════════════════════════════════════════════

  <!-- ═══════════════════════════════════════════════════════════════

       STATUS TOAST

    class="hidden fixed bottom-4 right-4 z-[100] bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 text-xs text-gray-200 shadow-xl flex items-center gap-2 max-w-xs">

  <!-- ═══════════════════════════════════════════════════════════════
       APPLICATION SCRIPT
  ════════════════════════════════════════════════════════════════ -->
  <script>
  /* ═══════════════════════════════════════════════════════════════════════════
     SECTION 1 — DATA MODELS & CONSTANTS
     No DOM access in this section.
  ═══════════════════════════════════════════════════════════════════════════ */

  /**
   * @typedef {{ id: string, name: string, fte: number, allowedShiftTypes: string[], fixedOffDates: string[], notes?: string }} Employee
   * @typedef {{ date: string, employeeId: string, shiftCode: string, isFixed?: boolean, note?: string }} Assignment
   * @typedef {{ assignments: Assignment[], violations: string[], workloadSummary: Object.<string,{assigned:number,target:number}> }} ScheduleOutput
   * @typedef {{ employees: Employee[], dates: string[], dailyDemand: Object.<string,Object.<string,number>>, preAssignedOff: Object.<string,boolean>, lockedAssignments: Assignment[], targetShiftsPerWeekFor1FTE: number }} ScheduleInput
   */

  /** Canonical employee definitions (defaults; may be overridden by Excel import). */
  const DEFAULT_EMPLOYEES = [
    { id: 'mo-kim',             name: 'Mo Kim',             fte: 1.0, allowedShiftTypes: ['OIC', 'HIF'],                                fixedOffDates: [] },
    { id: 'hung-nguyen',        name: 'Hung Nguyen',         fte: 1.0, allowedShiftTypes: ['OIC', 'HIF'],                                fixedOffDates: [] },
    { id: 'anthony-mcdonald',   name: 'Anthony McDonald',    fte: 1.0, allowedShiftTypes: ['OE', 'IV', 'OIC', 'HIF', 'OP', 'CLINICAL'], fixedOffDates: [] },
    { id: 'mollie-mcgee-boyle', name: 'Mollie McGee-Boyle',  fte: 0.8, allowedShiftTypes: ['IV', 'OP', 'OE'],                           fixedOffDates: [] },
    { id: 'sean-michael',       name: 'Sean Michael',        fte: 1.0, allowedShiftTypes: ['IV', 'OP', 'OE'],                           fixedOffDates: [] },
    { id: 'mary-rotondo',       name: 'Mary Rotondo',        fte: 0.9, allowedShiftTypes: ['IV', 'OP', 'OE'],                           fixedOffDates: [] },
    { id: 'scott-van-horn',     name: 'Scott Van Horn',      fte: 1.0, allowedShiftTypes: ['IV', 'OP', 'OE', 'MGR'],                    fixedOffDates: [], noFteTarget: true },
  ];

  /**
   * Shift UI colors. Maps code → { label, desc, bg (hex), text (hex), excelArgb }.
   * OFF is handled separately (fixed = blue-700, soft = near-transparent).
   */
  const SHIFT_COLORS = {
    OE:       { label: 'OE',   desc: 'Order Entry',    bg: '#fef9c3', text: '#78350f', excelArgb: 'FFFEF9C3' },
    IV:       { label: 'IV',   desc: 'IV Room',        bg: '#ccfbf1', text: '#115e59', excelArgb: 'FFCCFBF1' },
    OIC:      { label: 'OIC',  desc: 'Infusion Care',  bg: '#dbeafe', text: '#1e40af', excelArgb: 'FFDBEAFE' },
    HIF:      { label: 'HIF',  desc: 'Home Infusion',  bg: '#f3e8ff', text: '#6b21a8', excelArgb: 'FFF3E8FF' },
    OP:       { label: 'OP',   desc: 'Outpatient',     bg: '#dcfce7', text: '#166534', excelArgb: 'FFDCFCE7' },
    CLINICAL: { label: 'CLIN', desc: 'Clinical',       bg: '#ffedd5', text: '#9a3412', excelArgb: 'FFFFEDD5' },
    MANAGER:  { label: 'MGR',  desc: 'Manager',        bg: '#e2e8f0', text: '#1e293b', excelArgb: 'FFE2E8F0' },
    OE_EARLY: { label: 'OE+',  desc: 'OE Early 07:00', bg: '#fef3c7', text: '#78350f', excelArgb: 'FFFEF3C7' },
  };

  /** Fill priority for slot assignment (lower = filled first). */
  const SHIFT_SLOT_PRIORITY = { OIC: 0, HIF: 1, IV: 2, OP: 3, OE: 4, CLINICAL: 5 };

  /** Shift codes shown in the demand config panel (ordered by priority). */
  const DEMAND_SHIFT_CODES = ['OIC', 'HIF', 'IV', 'OP', 'OE', 'CLINICAL'];

  /** Default demand presets. */
  const DEFAULT_WEEKDAY_DEMAND = { OIC: 1, HIF: 1, IV: 1, OP: 1, OE: 1, CLINICAL: 0 };
  const DEFAULT_WEEKEND_DEMAND = { OIC: 0, HIF: 0, IV: 0, OP: 0, OE: 0, CLINICAL: 0 };

  const WEEKDAY_NAMES  = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  const OFF_CELL_ARGB  = 'FF4472C4';  // Blue fill used in exported .xlsx for OFF days

  /** Regex matching common Excel "blue" fill ARGB values that indicate an OFF day. */
  const BLUE_FILL_RE = /^(FF)?(4472C4|5B9BD5|2E74B5|0070C0|4F81BD|17375E)/i;

  /** Mutable application state — single source of truth. */
  const appState = {
    employees:         DEFAULT_EMPLOYEES.map(e => ({ ...e, fixedOffDates: [] })),
    dates:             [],
    assignments:       [],
    violations:        [],
    workloadSummary:   {},
    preAssignedOff:    {},      // key: `${empId}_${date}` → true   (hard fixed OFF from Excel)
    lockedAssignments: [],      // from Excel import, isFixed: true
  };


  /* ═══════════════════════════════════════════════════════════════════════════
     SECTION 2 — SCHEDULER ENGINE
     Pure functions only. Zero DOM access anywhere in this section.
  ═══════════════════════════════════════════════════════════════════════════ */

  /**
   * Main scheduling entry point.
   * Implements constraints R1–R9 as documented below.
   *
   * @param {ScheduleInput} input
   * @returns {ScheduleOutput}
   */
  function generateSchedule(input) {
    const {
      employees,
      dates,
      dailyDemand,
      preAssignedOff,
      lockedAssignments = [],
      targetShiftsPerWeekFor1FTE = 5,
    } = input;

    // Working assignment list: start with locked (fixed) cells from import.
    /** @type {Assignment[]} */
    const assignments = lockedAssignments.map(a => ({ ...a, isFixed: true }));
    /** @type {string[]} */
    const violations  = [];

    // Initialize running shift counts (including any pre-existing locked shifts).
    /** @type {Object.<string,number>} */
    const shiftCount = {};
    for (const emp of employees) shiftCount[emp.id] = 0;
    for (const a of assignments) {
      if (a.shiftCode !== 'OFF') shiftCount[a.employeeId] = (shiftCount[a.employeeId] || 0) + 1;
    }

    // Track consecutive IV days per employee for soft-warning detection.
    /** @type {Object.<string,{count:number,startDate:string}|null>} */
    const ivStreak = {};
    for (const emp of employees) ivStreak[emp.id] = null;

    // R11: weekly shift history — { employeeId: { shiftCode: count } }, resets each Mon.
    /** @type {Object.<string,Object.<string,number>>} */
    const weeklyShiftHistory = {};
    for (const emp of employees) weeklyShiftHistory[emp.id] = {};
    let currentWeekStart = null;

    /** @param {string} dateStr @returns {string} ISO date of the Monday of that week */
    function getWeekStart(dateStr) {
      const d   = new Date(dateStr + 'T00:00:00');
      const day = d.getDay();                     // 0 = Sun
      const diff = day === 0 ? -6 : 1 - day;     // shift to Monday
      const mon = new Date(d);
      mon.setDate(d.getDate() + diff);
      return mon.toISOString().slice(0, 10);
    }

    // ── Process each date chronologically ──────────────────────────────────
    for (const date of dates) {
      // R11: reset weekly history at the start of each new Mon–Fri week.
      const weekStart = getWeekStart(date);
      if (weekStart !== currentWeekStart) {
        currentWeekStart = weekStart;
        for (const emp of employees) weeklyShiftHistory[emp.id] = {};
      }

      const demand      = dailyDemand[date] || {};
      const totalDemand = Object.values(demand).reduce((s, n) => s + (n || 0), 0);

      if (totalDemand === 0) {
        // No shifts needed: mark all unassigned employees as OFF.
        for (const emp of employees) {
          const alreadyHas = assignments.some(a => a.date === date && a.employeeId === emp.id);
          if (!alreadyHas) {
            const isFixed = !!preAssignedOff[`${emp.id}_${date}`];
            assignments.push({ date, employeeId: emp.id, shiftCode: 'OFF', isFixed });
          }
        }
      } else {
        const dayResults = assignDay(
          date, demand, employees, assignments, shiftCount,
          preAssignedOff, violations, targetShiftsPerWeekFor1FTE,
          weeklyShiftHistory,
        );

        for (const a of dayResults) {
          assignments.push(a);
          if (a.shiftCode !== 'OFF') shiftCount[a.employeeId] = (shiftCount[a.employeeId] || 0) + 1;
        }

        // R11: update weekly history from today's assignments.
        for (const a of dayResults) {
          if (a.shiftCode !== 'OFF' && a.shiftCode !== 'MANAGER') {
            const hist = weeklyShiftHistory[a.employeeId];
            hist[a.shiftCode] = (hist[a.shiftCode] || 0) + 1;
          }
        }

        // ── R2: Mo and Hung must never both be OFF ─────────────────────────
        enforceR2(date, employees, assignments, preAssignedOff, violations);

        // ── R7: Hung defaults to HIF (R8 exception handled inside) ─────────
        enforceR7(date, employees, assignments, preAssignedOff);
      }

      // ── Soft warning: consecutive IV streak > 3 days ────────────────────
      for (const emp of employees) {
        const a = assignments.find(x => x.date === date && x.employeeId === emp.id);
        if (a?.shiftCode === 'IV') {
          if (!ivStreak[emp.id]) ivStreak[emp.id] = { count: 0, startDate: date };
          ivStreak[emp.id].count++;
          if (ivStreak[emp.id].count > 3) {
            violations.push(
              `SOFT WARNING [${date}]: ${emp.name} has ${ivStreak[emp.id].count} consecutive IV days (since ${ivStreak[emp.id].startDate})`,
            );
          }
        } else {
          ivStreak[emp.id] = null;
        }
      }
    }

    // ── Workload summary ──────────────────────────────────────────────────
    const totalDays      = dates.length;
    const workloadSummary = {};
    for (const emp of employees) {
      const assigned = assignments.filter(a => a.employeeId === emp.id && a.shiftCode !== 'OFF').length;
      const target   = emp.noFteTarget ? null : Math.round(emp.fte * targetShiftsPerWeekFor1FTE * (totalDays / 7));
      workloadSummary[emp.id] = { assigned, target };
    }

    return { assignments, violations, workloadSummary };
  }

  /**
   * Assign shifts for a single date.
   * Pure function — no DOM access.
   *
   * @param {string} date
   * @param {Object.<string,number>} demand  - { shiftCode: count }
   * @param {Employee[]} employees
   * @param {Assignment[]} allAssignments    - all assignments accumulated so far
   * @param {Object.<string,number>} shiftCount
   * @param {Object.<string,boolean>} preAssignedOff
   * @param {string[]} violations
   * @param {number} targetShiftsPerWeek
   * @returns {Assignment[]}
   */
  function assignDay(date, demand, employees, allAssignments, shiftCount, preAssignedOff, violations, targetShiftsPerWeek, weeklyShiftHistory) {
    /** @type {Assignment[]} */
    const results       = [];
    const assignedToday = new Set();

    const MO_ID      = 'mo-kim';
    const HUNG_ID    = 'hung-nguyen';
    const ANTHONY_ID = 'anthony-mcdonald';
    const SCOTT_ID   = 'scott-van-horn';
    const MOLLIE_ID  = 'mollie-mcgee-boyle';
    const SEAN_ID    = 'sean-michael';
    const MARY_ID    = 'mary-rotondo';

    // Mark employees who already have any assignment (locked or otherwise) today.
    for (const emp of employees) {
      if (allAssignments.some(a => a.date === date && a.employeeId === emp.id)) {
        assignedToday.add(emp.id);
      }
    }

    // Is Mo OFF today? (R8 depends on this before we process the OIC slot.)
    const moIsOff = isOffOnDate(
      employees.find(e => e.id === MO_ID), date, allAssignments, preAssignedOff,
    );

    // Anthony prefers CLINICAL over regular shifts whenever Mo is available.
    // (CLINICAL demand does NOT need to be > 0 — Anthony fills it post-loop.)
    const anthonyIsOff = isOffOnDate(
      employees.find(e => e.id === ANTHONY_ID), date, allAssignments, preAssignedOff,
    );
    const anthonyPrefersClinical = !moIsOff && !anthonyIsOff;

    // Sort slots by priority: OIC → HIF → IV → OP → OE → CLINICAL.
    const slots = Object.entries(demand)
      .filter(([, count]) => Number(count) > 0)
      .sort(([a], [b]) => (SHIFT_SLOT_PRIORITY[a] ?? 99) - (SHIFT_SLOT_PRIORITY[b] ?? 99));

    for (const [shiftCode, rawCount] of slots) {
      const count = Number(rawCount);
      for (let i = 0; i < count; i++) {

        // Eligible employees: not yet assigned today, not OFF, shift type allowed (enforces R1, R3, R5).
        let eligible = employees.filter(emp =>
          !assignedToday.has(emp.id) &&
          !isOffOnDate(emp, date, allAssignments, preAssignedOff) &&  // R5
          emp.allowedShiftTypes.includes(shiftCode),                  // R1 / R3
        );

        // Anthony prefers CLINICAL — exclude him from other slots if others can cover.
        // Soft exclusion: only remove Anthony when at least one other eligible exists.
        if (anthonyPrefersClinical && shiftCode !== 'CLINICAL') {
          const withoutAnthony = eligible.filter(e => e.id !== ANTHONY_ID);
          if (withoutAnthony.length > 0) eligible = withoutAnthony;
        }

        if (shiftCode === 'OIC' && moIsOff) {
          // ── R8: Mo is OFF → fill OIC with Anthony first, others second, Hung last ──
          // Keeping Hung as last resort preserves him for HIF (R7).
          const anthony = eligible.find(e => e.id === ANTHONY_ID);
          const hung    = eligible.find(e => e.id === HUNG_ID);
          const others  = eligible.filter(e => e.id !== ANTHONY_ID && e.id !== HUNG_ID);
          eligible = [
            ...(anthony ? [anthony] : []),
            ...rankByDeficit(others, shiftCount, targetShiftsPerWeek, weeklyShiftHistory, shiftCode),
            ...(hung    ? [hung]    : []),
          ];

        } else if (shiftCode === 'OIC') {
          // ── Mo is available → pin Mo to OIC ──────────────────────────────────────
          const mo     = eligible.find(e => e.id === MO_ID);
          const others = eligible.filter(e => e.id !== MO_ID);
          eligible = mo
            ? [mo, ...rankByDeficit(others, shiftCount, targetShiftsPerWeek, weeklyShiftHistory, shiftCode)]
            : rankByDeficit(others, shiftCount, targetShiftsPerWeek, weeklyShiftHistory, shiftCode);

        } else if (shiftCode === 'HIF') {
          // ── R7: Hung is the preferred employee for HIF ────────────────────────────
          const hung   = eligible.find(e => e.id === HUNG_ID);
          const others = eligible.filter(e => e.id !== HUNG_ID);
          eligible = hung
            ? [hung, ...rankByDeficit(others, shiftCount, targetShiftsPerWeek, weeklyShiftHistory, shiftCode)]
            : rankByDeficit(others, shiftCount, targetShiftsPerWeek, weeklyShiftHistory, shiftCode);

        } else if (shiftCode === 'CLINICAL') {
          // ── R9: Anthony is preferred for CLINICAL ─────────────────────────────────
          const anthony = eligible.find(e => e.id === ANTHONY_ID);
          const others  = eligible.filter(e => e.id !== ANTHONY_ID);
          eligible = anthony
            ? [anthony, ...rankByDeficit(others, shiftCount, targetShiftsPerWeek, weeklyShiftHistory, shiftCode)]
            : rankByDeficit(others, shiftCount, targetShiftsPerWeek, weeklyShiftHistory, shiftCode);

        } else {
          // ── R6/R10: FTE-deficit ranking; Scott Van Horn is last resort ────────────
          const scottEligible  = eligible.find(e => e.id === SCOTT_ID);
          const othersEligible = eligible.filter(e => e.id !== SCOTT_ID);
          eligible = [
            ...rankByDeficit(othersEligible, shiftCount, targetShiftsPerWeek, weeklyShiftHistory, shiftCode),
            ...(scottEligible ? [scottEligible] : []),
          ];
        }

        if (eligible.length === 0) {
          // ── R9: CLINICAL is optional — silently skip if Anthony is unavailable ────
          if (shiftCode === 'CLINICAL') continue;
          violations.push(`DEMAND [${date}]: No eligible employee available for ${shiftCode} shift`);
          continue;
        }

        const chosen = eligible[0];
        assignedToday.add(chosen.id);
        results.push({ date, employeeId: chosen.id, shiftCode, isFixed: false });
      }
    }

    // ── Post-loop: Anthony → CLINICAL if available and all main shifts filled ──
    // This applies even when CLINICAL demand = 0; Anthony works CLINICAL whenever
    // there is nothing else for him to cover.
    const anthonyEmp = employees.find(e => e.id === ANTHONY_ID);
    if (anthonyEmp && !assignedToday.has(ANTHONY_ID) &&
        !isOffOnDate(anthonyEmp, date, allAssignments, preAssignedOff)) {
      const mainShifts  = ['OIC', 'HIF', 'IV', 'OP', 'OE'];
      const allMainFilled = mainShifts.every(code => {
        const demanded = Number(demand[code] ?? 0);
        return demanded === 0 || results.filter(r => r.shiftCode === code).length >= demanded;
      });
      if (allMainFilled) {
        assignedToday.add(ANTHONY_ID);
        results.push({ date, employeeId: ANTHONY_ID, shiftCode: 'CLINICAL', isFixed: false });
      }
    }

    // ── Post-loop: Scott → MANAGER if unassigned after all slots filled (R10) ──
    const scottEmp = employees.find(e => e.id === SCOTT_ID);
    if (scottEmp && !assignedToday.has(SCOTT_ID) &&
        !isOffOnDate(scottEmp, date, allAssignments, preAssignedOff)) {
      assignedToday.add(SCOTT_ID);
      results.push({ date, employeeId: SCOTT_ID, shiftCode: 'MANAGER', isFixed: false });
    }

    // Mark all remaining unassigned employees as OFF for this day.
    for (const emp of employees) {
      if (!assignedToday.has(emp.id)) {
        const isFixed = !!preAssignedOff[`${emp.id}_${date}`];
        results.push({ date, employeeId: emp.id, shiftCode: 'OFF', isFixed });
      }
    }

    return results;
  }

  /**
   * R2 enforcement (post-day):
   * Mo and Hung must never both be OFF on the same day.
   * Auto-recovery: assign Mo to OIC if Mo's OFF is not hard-fixed.
   * Fallback: assign Hung to HIF if Hung's OFF is not hard-fixed.
   * If both are hard-fixed OFF → record a hard violation.
   *
   * @param {string} date
   * @param {Employee[]} employees
   * @param {Assignment[]} assignments
   * @param {Object.<string,boolean>} preAssignedOff
   * @param {string[]} violations
   */
  function enforceR2(date, employees, assignments, preAssignedOff, violations) {
    const MO_ID   = 'mo-kim';
    const HUNG_ID = 'hung-nguyen';

    const moA   = assignments.find(a => a.date === date && a.employeeId === MO_ID);
    const hungA = assignments.find(a => a.date === date && a.employeeId === HUNG_ID);

    const moOff   = !moA   || moA.shiftCode   === 'OFF';
    const hungOff = !hungA || hungA.shiftCode === 'OFF';

    if (!(moOff && hungOff)) return; // Rule not violated — nothing to do.

    const moHardOff   = !!preAssignedOff[`${MO_ID}_${date}`];
    const hungHardOff = !!preAssignedOff[`${HUNG_ID}_${date}`];

    if (!moHardOff && moA) {
      // Auto-recover: force Mo to OIC.
      moA.shiftCode = 'OIC';
      moA.isFixed   = false;
    } else if (!hungHardOff && hungA) {
      // Fallback: force Hung to HIF.
      hungA.shiftCode = 'HIF';
      hungA.isFixed   = false;
    } else {
      // Both have hard fixed OFF — unresolvable, record violation.
      violations.push(
        `HARD VIOLATION [${date}]: Mo Kim and Hung Nguyen are both marked OFF. Manual review required.`,
      );
    }
  }

  /**
   * R7 enforcement (post-day):
   * When Hung is working, his shift must be HIF by default.
   * Exception (R8): if Hung was assigned OIC because Mo is OFF AND Anthony was
   * unavailable, do NOT overwrite — that was the correct R8 fallback.
   *
   * @param {string} date
   * @param {Employee[]} employees
   * @param {Assignment[]} assignments
   * @param {Object.<string,boolean>} preAssignedOff
   */
  function enforceR7(date, employees, assignments, preAssignedOff) {
    const HUNG_ID = 'hung-nguyen';
    const MO_ID   = 'mo-kim';

    const hungA = assignments.find(a => a.date === date && a.employeeId === HUNG_ID);
    if (!hungA || hungA.shiftCode === 'OFF') return; // Hung is not working — nothing to do.
    if (hungA.isFixed) return;                        // Never overwrite imported fixed assignments.

    // ── R8 exception: Hung is on OIC because Mo is OFF (legitimate fallback) ──
    if (hungA.shiftCode === 'OIC') {
      const moA       = assignments.find(a => a.date === date && a.employeeId === MO_ID);
      const moIsOff   = !moA || moA.shiftCode === 'OFF';
      const moHardOff = !!preAssignedOff[`${MO_ID}_${date}`];
      if (moIsOff || moHardOff) return; // R8 applied correctly — leave Hung on OIC.
    }

    // Default R7: Hung is working → force HIF.
    hungA.shiftCode = 'HIF';
  }

  /**
   * Sort employees by deficit descending: employees furthest below their FTE
   * target are ranked first, ensuring balanced workload (R6).
   *
   * @param {Employee[]} employees
   * @param {Object.<string,number>} shiftCount
   * @param {number} targetShiftsPerWeek  - target for 1.0 FTE
   * @returns {Employee[]}
   */
  function rankByDeficit(employees, shiftCount, targetShiftsPerWeek, weeklyShiftHistory = null, shiftCode = null) {
    return [...employees].sort((a, b) => {
      const defA = (a.fte * targetShiftsPerWeek / 5) - (shiftCount[a.id] || 0);
      const defB = (b.fte * targetShiftsPerWeek / 5) - (shiftCount[b.id] || 0);
      const diffDef = defB - defA; // descending: highest deficit first
      if (Math.abs(diffDef) > 0.001) return diffDef;
      // R11 soft tie-breaker: prefer employees consistent with their shift this week
      if (weeklyShiftHistory && shiftCode) {
        const cA = (weeklyShiftHistory[a.id] ?? {})[shiftCode] ?? 0;
        const cB = (weeklyShiftHistory[b.id] ?? {})[shiftCode] ?? 0;
        return cB - cA;
      }
      return 0;
    });
  }

  /**
   * Returns true if the given employee is OFF on the given date.
   * Checks (in order): hard pre-assigned OFF map, fixedOffDates array,
   * existing assignment in the list.
   *
   * @param {Employee|undefined} emp
   * @param {string} date
   * @param {Assignment[]} assignments
   * @param {Object.<string,boolean>} preAssignedOff
   * @returns {boolean}
   */
  function isOffOnDate(emp, date, assignments, preAssignedOff) {
    if (!emp) return false;
    if (preAssignedOff[`${emp.id}_${date}`]) return true;
    if (Array.isArray(emp.fixedOffDates) && emp.fixedOffDates.includes(date)) return true;
    const existing = assignments.find(a => a.date === date && a.employeeId === emp.id);
    return existing?.shiftCode === 'OFF';
  }

  /**
   * Generate an array of ISO date strings from start to end (inclusive).
   *
   * @param {string} start  - ISO date "YYYY-MM-DD"
   * @param {string} end    - ISO date "YYYY-MM-DD"
   * @returns {string[]}
   */
  function getDatesInRange(start, end) {
    const dates = [];
    const cur   = new Date(start + 'T12:00:00Z');
    const stop  = new Date(end   + 'T12:00:00Z');
    while (cur <= stop) {
      dates.push(cur.toISOString().slice(0, 10));
      cur.setUTCDate(cur.getUTCDate() + 1);
    }
    return dates;
  }


  /* ═══════════════════════════════════════════════════════════════════════════
     SECTION 3 — EXCEL ADAPTER
     Uses ExcelJS loaded from CDN. Runs in-browser — no Node.js required.
  ═══════════════════════════════════════════════════════════════════════════ */

  /**
   * Normalize raw cell text to a canonical shift code, or null if unrecognised.
   *
   * @param {string|null|undefined} raw
   * @returns {string|null}
   */
  function normalizeShiftCode(raw) {
    const SHIFT_MAP = {
      'HI':                   'HIF',
      'HIF':                  'HIF',
      'OE':                   'OE',
      'IV':                   'IV',
      'OIC':                  'OIC',
      'OP':                   'OP',
      'CLINICAL':              'CLINICAL',
      'OE EARLY':              'OE_EARLY',
      'OE_EARLY':              'OE_EARLY',
      'OE EARLY OPEN 07:00':  'OE_EARLY',
      'ORDER ENTRY':           'OE',
    };
    return SHIFT_MAP[(raw || '').trim().toUpperCase()] ?? null;
  }

  /**
   * Convert an employee display name to a URL-safe ID slug.
   * e.g. "Mollie McGee-Boyle" → "mollie-mcgee-boyle"
   *
   * @param {string} name
   * @returns {string}
   */
  function toEmployeeId(name) {
    return name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  }

  /**
   * Returns true if the ExcelJS cell has a blue fill colour (OFF indicator).
   * Matches the common Excel "blue" ARGB values used by the NSL workbook.
   *
   * @param {import('exceljs').Cell} cell
   * @returns {boolean}
   */
  function isCellBlue(cell) {
    const fill = cell.fill;
    if (!fill || fill.type !== 'pattern') return false;
    const fg   = fill.fgColor;
    if (!fg) return false;
    const argb = fg.argb || fg.rgb || '';
    return BLUE_FILL_RE.test(argb);
  }

  /**
   * Extract a JavaScript Date from any ExcelJS cell value type.
   * Handles: Date objects, Excel serial numbers, ISO strings, "YYYY-MM-DD HH:MM:SS"
   * strings, formula result objects { formula, result }, and rich-text objects.
   *
   * @param {*} val  - cell.value from ExcelJS
   * @returns {Date|null}
   */
  /**
   * Return a Date set to 12:00:00 UTC on the given calendar date.
   * Using noon UTC guarantees d.toISOString().slice(0,10) returns the correct
   * date string in every timezone (UTC-12 through UTC+14).
   * @param {number} y  @param {number} m (0-based)  @param {number} d
   * @returns {Date|null}
   */
  function _utcNoon(y, m, d) {
    if (y < 2000 || y > 2040) return null;
    const dt = new Date(Date.UTC(y, m, d, 12, 0, 0));
    return isNaN(dt.getTime()) ? null : dt;
  }

  /**
   * Extract a calendar date from any ExcelJS cell value type.
   * Always returns a Date at 12:00:00 UTC so callers can safely use
   * d.toISOString().slice(0,10) without timezone-shift errors.
   *
   * Handles:
   *   ① JS Date objects (ExcelJS emits these as UTC midnight)
   *   ② Excel serial numbers (integer days since 1900-01-00)
   *   ③ ISO / "YYYY-MM-DD HH:MM:SS" strings — parsed by component, not Date()
   *   ④ Formula result objects: { formula, result }
   *   ⑤ Rich-text objects:     { richText: [{ text }, …] }
   *
   * @param {*} val  - cell.value from ExcelJS
   * @returns {Date|null}
   */
  function excelValToDate(val) {
    if (val === null || val === undefined) return null;

    // ① Direct Date object — ExcelJS emits UTC midnight; extract UTC components.
    if (val instanceof Date) {
      return _utcNoon(val.getUTCFullYear(), val.getUTCMonth(), val.getUTCDate());
    }

    // ② Excel serial number (days since 1900-01-00; >1 to skip booleans/0/1)
    if (typeof val === 'number' && isFinite(val) && val > 1) {
      const msEpoch = (Math.floor(val) - 25569) * 86400 * 1000;
      const tmp     = new Date(msEpoch);
      return _utcNoon(tmp.getUTCFullYear(), tmp.getUTCMonth(), tmp.getUTCDate());
    }

    // ③ String — parse YYYY-MM-DD components directly to avoid new Date(str)
    //    timezone ambiguity. Handles "2026-05-07", "2026-05-07 00:00:00", etc.
    if (typeof val === 'string' && val.trim()) {
      const m = val.trim().match(/^(\d{4})-(\d{2})-(\d{2})/);
      if (m) return _utcNoon(+m[1], +m[2] - 1, +m[3]);
    }

    // ④ Formula result object: { formula: "...", result: <any of the above> }
    if (typeof val === 'object' && val !== null && val.result !== undefined) {
      return excelValToDate(val.result);
    }

    // ⑤ Rich-text object: { richText: [{ text, font }, ...] }
    if (typeof val === 'object' && val !== null && Array.isArray(val.richText)) {
      const text = val.richText.map(r => r.text || '').join('').trim();
      return text ? excelValToDate(text) : null;
    }

    return null;
  }

  /**
   * Parse an uploaded .xlsx file using ExcelJS.
   * Returns employees, detected ISO dates, pre-assigned-OFF map, and locked assignments.
   *
   * @param {File} file
   * @returns {Promise<{ employees: Employee[], detectedDates: string[], preAssignedOff: Object, lockedAssignments: Assignment[] }>}
   */
  async function parseWorkbook(file) {
    if (typeof ExcelJS === 'undefined') {
      throw new Error('ExcelJS library not loaded. Please check your internet connection.');
    }

    const wb          = new ExcelJS.Workbook();
    const arrayBuffer = await file.arrayBuffer();
    await wb.xlsx.load(arrayBuffer);

    const ws = wb.worksheets[0];
    if (!ws) throw new Error('No worksheet found in uploaded workbook');

    // ── Step 1: Find ALL NSL date-header rows across the entire sheet ─────────
    // The NSL workbook may have multiple stacked monthly sections, each with its
    // own date-header row (e.g. May in rows 1-9, June in rows 11-18). We scan
    // every row and treat any row that has ≥ 5 date-like values after column A
    // as a section header. Column → date mappings are section-local (column 2
    // may mean "5/1" in section 1 and "6/1" in section 2).
    /** @type {Array<{rowNum: number, dateByCol: Object.<number,string>}>} */
    const sections = [];

    ws.eachRow((row, rowNum) => {
      /** @type {Object.<number,string>} */
      const tempDates = {};
      row.eachCell({ includeEmpty: false }, (cell, colNum) => {
        if (colNum === 1) return;
        const d = excelValToDate(cell.value);
        if (d && !isNaN(d.getTime()) && d.getUTCFullYear() >= 2020 && d.getUTCFullYear() <= 2040) {
          tempDates[colNum] = d.toISOString().slice(0, 10);
        }
      });
      if (Object.keys(tempDates).length >= 5) {
        sections.push({ rowNum, dateByCol: tempDates });
      }
    });

    const detectedDates = [...new Set(sections.flatMap(s => Object.values(s.dateByCol)))].sort();
    if (detectedDates.length === 0) {
      throw new Error(
        'No date columns found in the workbook. ' +
        'Expected rows with date values (e.g. 2026-05-03) after the first column. ' +
        'Make sure you are uploading the NSL master schedule .xlsx file.',
      );
    }

    // For a given employee row number, return the section whose header row is
    // closest above it (header row ≤ rowNum - 2, leaving room for the label row).
    function sectionForRow(rowNum) {
      let active = null;
      for (const s of sections) {
        if (s.rowNum <= rowNum - 2) active = s;
        else break;
      }
      return active;
    }

    // Row numbers that are date-headers or their weekday-label rows — skip them.
    const headerRowNums = new Set(sections.flatMap(s => [s.rowNum, s.rowNum + 1]));

    // ── Step 2: Parse employee rows ───────────────────────────────────────────
    /** @type {Employee[]} */
    const employees        = [];
    /** @type {Object.<string,boolean>} */
    const preAssignedOff   = {};
    /** @type {Assignment[]} */
    const lockedAssignments = [];
    const seenEmpIds        = new Set();

    ws.eachRow((row, rowNum) => {
      if (headerRowNums.has(rowNum)) return; // skip header and label rows

      const section = sectionForRow(rowNum);
      if (!section) return; // before any date-header row

      const nameCell = row.getCell(1);
      const name     = nameCell.value ? String(nameCell.value).trim() : '';
      if (!name) return;
      if (/schedule\s*key/i.test(name)) return;

      const empId   = toEmployeeId(name);
      // Only accept the 7 known employees — skip totals, labels, or other rows.
      const defaults = DEFAULT_EMPLOYEES.find(e => e.id === empId);
      if (!defaults) return;

      if (!seenEmpIds.has(empId)) {
        seenEmpIds.add(empId);
        employees.push({
          id:                empId,
          name:              defaults.name,
          fte:               defaults.fte,
          allowedShiftTypes: defaults.allowedShiftTypes,
          fixedOffDates:     [],
        });
      }

      const emp = employees.find(e => e.id === empId);

      Object.entries(section.dateByCol).forEach(([colStr, date]) => {
        const cell       = row.getCell(Number(colStr));
        const isBlue     = isCellBlue(cell);
        const rawText    = cell.value != null ? String(cell.value).trim() : '';
        const isVacation = /vacation/i.test(rawText);
        const isLeave    = /leave\s+early|arrive\s+late/i.test(rawText);
        const isOut      = /^out\s*@/i.test(rawText);
        const shiftCode  = normalizeShiftCode(rawText);

        if (isBlue || isVacation) {
          if (!emp.fixedOffDates.includes(date)) emp.fixedOffDates.push(date);
          preAssignedOff[`${empId}_${date}`] = true;
          if (!lockedAssignments.some(a => a.date === date && a.employeeId === empId)) {
            lockedAssignments.push({ date, employeeId: empId, shiftCode: 'OFF', isFixed: true,
              note: isVacation ? 'Vacation' : (rawText || undefined) });
          }
        } else if (shiftCode && shiftCode !== 'OFF') {
          if (!lockedAssignments.some(a => a.date === date && a.employeeId === empId)) {
            lockedAssignments.push({ date, employeeId: empId, shiftCode, isFixed: true,
              note: (isLeave || isOut) ? rawText : undefined });
          }
        }
      });
    });

    if (employees.length === 0) {
      throw new Error('No employee rows found in workbook (expected rows starting from Row 3).');
    }

    return { employees, detectedDates, preAssignedOff, lockedAssignments };
  }

  /**
   * Build an .xlsx workbook from the current schedule and trigger a browser download.
   *
   * @param {Assignment[]} assignments
   * @param {Employee[]} employees
   * @param {string[]} dates  - ISO date strings, sorted
   * @returns {Promise<void>}
   */
  async function exportWorkbook(assignments, employees, dates) {
    if (typeof ExcelJS === 'undefined') {
      throw new Error('ExcelJS library not loaded. Please check your internet connection.');
    }

    const wb = new ExcelJS.Workbook();
    const ws = wb.addWorksheet('Schedule');

    // Excel ARGB fills per shift code (for the exported workbook).
    const EXCEL_FILLS = {
      OE:       'FFFEF9C3',
      IV:       'FFCCFBF1',
      OIC:      'FFDBEAFE',
      HIF:      'FFF3E8FF',
      OP:       'FFDCFCE7',
      CLINICAL: 'FFFFEDD5',
      OE_EARLY: 'FFFEF3C7',
    };

    // ── Row 1: NSL header + date values ───────────────────────────────────────
    const r1 = ws.addRow([
      'NSL',
      ...dates.map(d => {
        // Create a UTC noon Date to avoid timezone-day-shift issues.
        const dt = new Date(d + 'T12:00:00Z');
        return dt;
      }),
    ]);
    r1.getCell(1).font = { bold: true, color: { argb: 'FFFFFFFF' } };
    r1.getCell(1).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF1F3864' } };
    for (let c = 2; c <= dates.length + 1; c++) {
      const cell     = r1.getCell(c);
      cell.numFmt    = 'yyyy-mm-dd';
      cell.font      = { bold: true, color: { argb: 'FFFFFFFF' } };
      cell.fill      = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF1F3864' } };
      cell.alignment = { horizontal: 'center' };
    }

    // ── Row 2: Employee label + weekday names ─────────────────────────────────
    const r2 = ws.addRow([
      'Employee',
      ...dates.map(d => WEEKDAY_NAMES[new Date(d + 'T12:00:00Z').getUTCDay()]),
    ]);
    r2.getCell(1).font = { bold: true };
    for (let c = 2; c <= dates.length + 1; c++) {
      r2.getCell(c).alignment = { horizontal: 'center' };
      r2.getCell(c).font      = { bold: true };
    }

    // ── Rows 3+: One row per employee ─────────────────────────────────────────
    for (const emp of employees) {
      const rowData = [emp.name];
      for (const date of dates) {
        const a = assignments.find(x => x.date === date && x.employeeId === emp.id);
        rowData.push((a && a.shiftCode !== 'OFF') ? a.shiftCode : '');
      }

      const row = ws.addRow(rowData);
      row.getCell(1).font = { bold: false };

      for (let c = 2; c <= dates.length + 1; c++) {
        const date   = dates[c - 2];
        const a      = assignments.find(x => x.date === date && x.employeeId === emp.id);
        const cell   = row.getCell(c);
        const isOff  = !a || a.shiftCode === 'OFF';

        cell.fill = {
          type:    'pattern',
          pattern: 'solid',
          fgColor: { argb: isOff ? OFF_CELL_ARGB : (EXCEL_FILLS[a.shiftCode] || 'FFFFFFFF') },
        };
        cell.alignment = { horizontal: 'center', vertical: 'middle' };
      }
    }

    // ── Column widths ──────────────────────────────────────────────────────────
    ws.getColumn(1).width = 22;
    for (let c = 2; c <= dates.length + 1; c++) ws.getColumn(c).width = 9;

    // ── Write and trigger download ─────────────────────────────────────────────
    const buffer   = await wb.xlsx.writeBuffer();
    const blob     = new Blob([buffer], {
      type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
    });
    const url      = URL.createObjectURL(blob);
    const anchor   = document.createElement('a');
    anchor.href    = url;
    anchor.download = `NSL_Schedule_${dates[0] || 'export'}_to_${dates[dates.length - 1] || ''}.xlsx`;
    document.body.appendChild(anchor);
    anchor.click();
    document.body.removeChild(anchor);
    setTimeout(() => URL.revokeObjectURL(url), 5000);
  }


  /* ═══════════════════════════════════════════════════════════════════════════
     SECTION 4 — UI LAYER
     All DOM manipulation lives here. No scheduling logic.
  ═══════════════════════════════════════════════════════════════════════════ */

  // ── Utility helpers ─────────────────────────────────────────────────────────

  /**
   * Format an ISO date as "Mon 5/4" for display.
   * @param {string} isoDate
   * @returns {string}
   */
  function formatDate(isoDate) {
    const d = new Date(isoDate + 'T12:00:00Z');
    return `${WEEKDAY_NAMES[d.getUTCDay()]} ${d.getUTCMonth() + 1}/${d.getUTCDate()}`;
  }

  /**
   * Show a toast notification.
   * @param {string} msg
   * @param {'info'|'success'|'error'} type
   */
  function showToast(msg, type = 'info') {
    const t = document.getElementById('status-toast');
    t.innerHTML = '';
    const icon     = document.createElement('span');
    icon.className = type === 'error' ? 'text-red-400' : type === 'success' ? 'text-green-400' : 'text-blue-400';
    icon.textContent = type === 'error' ? '✕' : type === 'success' ? '✓' : 'ℹ';
    const text     = document.createElement('span');
    text.textContent = msg;
    t.appendChild(icon);
    t.appendChild(text);
    t.classList.remove('hidden');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.add('hidden'), 4000);
  }

  /**
   * Returns a CSS hex colour for a workload badge.
   * Green = 90–110%, Yellow = 75–89% or 111–125%, Red = outside.
   * @param {number} assigned
   * @param {number} target
   * @returns {string}
   */
  function workloadColor(assigned, target) {
    if (!target) return '#6b7280';
    const pct = (assigned / target) * 100;
    if (pct >= 90 && pct <= 110) return '#16a34a';       // green
    if ((pct >= 75 && pct < 90) || (pct > 110 && pct <= 125)) return '#d97706'; // amber
    return '#dc2626';                                      // red
  }

  // ── Shift legend ────────────────────────────────────────────────────────────

  function renderShiftLegend() {
    const el = document.getElementById('shift-legend');
    el.innerHTML = '';
    for (const code of DEMAND_SHIFT_CODES) {
      const sc  = SHIFT_COLORS[code];
      const div = document.createElement('div');
      div.className = 'flex items-center gap-1';

        <span class="px-1.5 py-px rounded text-xs font-semibold" style="background:${sc.bg};color:${sc.text}">${sc.label}</span>
        <span class="text-gray-600 text-xs hidden sm:inline">${sc.desc}</span>`;
      el.appendChild(div);

    // Fixed OFF badge
    const off     = document.createElement('div');
    off.className = 'flex items-center gap-1';
    off.innerHTML = `
      <span class="px-1.5 py-px rounded text-xs font-semibold" style="background:#1d4ed8;color:#fff">OFF</span>
      <span class="text-gray-600 text-xs hidden sm:inline">Fixed Off</span>`;
    el.appendChild(off);

  // ── Schedule grid ────────────────────────────────────────────────────────────

  /** Re-render the full schedule grid from appState. */
  function renderGrid() {
    const container = document.getElementById('grid-container');
    const { employees, dates, assignments, preAssignedOff, workloadSummary } = appState;

    if (dates.length === 0) {
      container.innerHTML = `
        <div id="grid-empty" class="flex flex-col items-center justify-center h-64 text-gray-700">
          <div class="text-4xl mb-3 opacity-30">📅</div>
          <p class="text-sm">Configure settings then click <span class="text-gray-500 font-medium">Generate Schedule</span></p>
          <p class="text-xs mt-1 opacity-50">or import an existing master .xlsx file</p>
        </div>`;
      return;
    }

    const table      = document.createElement('table');
    table.className  = 'border-collapse text-xs';
    table.style.cssText = 'border-spacing:0';

    // ── Header row ────────────────────────────────────────────────────────────
    const thead   = table.createTHead();
    const headRow = thead.insertRow();

    const empTh      = document.createElement('th');
    empTh.className  = 'sticky-emp-col bg-gray-900 border-b border-r border-gray-700 px-3 py-2 text-left text-xs font-medium text-gray-400';
    empTh.style.minWidth = '172px';
    empTh.textContent = 'Employee';
    headRow.appendChild(empTh);

    for (const date of dates) {
      const d     = new Date(date + 'T12:00:00Z');
      const dow   = d.getUTCDay();
      const isWE  = dow === 0 || dow === 6;
      const th    = document.createElement('th');
      th.className = [
        'border-b border-r border-gray-800 px-1 py-1 text-center font-normal',
        isWE ? 'bg-gray-900 text-gray-600' : 'bg-gray-950 text-gray-400',
      ].join(' ');
      th.style.minWidth = '52px';
      th.innerHTML = `
        <div class="font-semibold text-xs">${WEEKDAY_NAMES[dow]}</div>
        <div class="text-gray-600 text-xs">${d.getUTCMonth() + 1}/${d.getUTCDate()}</div>`;
      headRow.appendChild(th);
    }

    // ── Body rows (one per employee) ──────────────────────────────────────────
    const tbody = table.createTBody();

    for (const emp of employees) {
      const tr     = document.createElement('tr');
      tr.className = 'group';

      // ── Employee name cell (sticky) ────────────────────────────────────────
      const nameTd     = document.createElement('td');
      nameTd.className = 'sticky-emp-col bg-gray-900 group-hover:bg-gray-850 border-b border-r border-gray-800 px-3 py-1 whitespace-nowrap';
      nameTd.style.minWidth = '172px';

      const ws      = workloadSummary[emp.id];
      const badgeColor = ws ? workloadColor(ws.assigned, ws.target) : '#6b7280';
      const badgeLabel = ws ? `${ws.assigned}/${ws.target}` : '';

      nameTd.innerHTML = `
        <div class="flex items-center justify-between gap-2">
          <span class="text-gray-200 text-xs font-medium leading-tight">${emp.name}</span>
          <div class="flex items-center gap-1.5 shrink-0">
            <span class="text-gray-600 text-xs">${emp.fte}FTE</span>
            ${ws ? `<span class="text-xs font-mono px-1.5 py-px rounded-full text-white" style="background:${badgeColor}">${badgeLabel}</span>` : ''}
          </div>
        </div>`;
      tr.appendChild(nameTd);

      // ── One cell per date ──────────────────────────────────────────────────
      for (const date of dates) {
        const a     = assignments.find(x => x.date === date && x.employeeId === emp.id);
        const d     = new Date(date + 'T12:00:00Z');
        const dow   = d.getUTCDay();
        const isWE  = dow === 0 || dow === 6;
        const isFixed = a?.isFixed || !!preAssignedOff[`${emp.id}_${date}`];

        const td    = document.createElement('td');
        td.className = [
          'border-b border-r border-gray-800 p-0.5 text-center',
          isWE ? 'bg-gray-950/70' : '',
        ].join(' ');
        td.style.minWidth = '52px';

        if (!a || a.shiftCode === 'OFF') {
          if (isFixed) {
            // Fixed OFF (from Excel blue cell / Vacation) — solid blue badge.
            td.innerHTML = `<div class="mx-auto px-1 py-px rounded text-xs font-semibold shift-badge" style="background:#1d4ed8;color:#fff;min-width:38px;display:inline-block" title="Fixed OFF">OFF</div>`;
          } else {
            // Soft OFF (engine-generated) — nearly invisible.
            td.innerHTML = `<div class="mx-auto px-1 py-px rounded text-xs shift-badge" style="background:transparent;color:#374151;min-width:38px;display:inline-block">&nbsp;</div>`;
          }
        } else {
          const sc = SHIFT_COLORS[a.shiftCode];
          const bg   = sc ? sc.bg   : '#374151';
          const fg   = sc ? sc.text : '#d1d5db';
          const lbl  = sc ? sc.label : a.shiftCode;
          const border = isFixed ? ';outline:1.5px solid #6b7280;outline-offset:-1px' : '';
          td.innerHTML = `<div class="mx-auto px-1 py-px rounded text-xs font-semibold shift-badge" style="background:${bg};color:${fg};min-width:38px;display:inline-block${border}" title="${isFixed ? 'Fixed (imported)' : a.shiftCode}">${lbl}</div>`;

        // Click to edit (non-fixed cells only).
        if (!isFixed) {
          td.style.cursor = 'pointer';
          td.title = `Click to assign — ${emp.name} on ${formatDate(date)}`;
          td.addEventListener('click', (e) => {
            e.stopPropagation();
            openCellEditor(emp.id, date, td);
          });
          // Right-click to clear.
          td.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            updateAssignment(emp.id, date, 'OFF');

        tr.appendChild(td);
      }

      tbody.appendChild(tr);
    }

    container.innerHTML = '';
    container.appendChild(table);

  // ── Cell editor dropdown ─────────────────────────────────────────────────────

  let _dropdownCloseHandler = null;

  /**
   * Open the inline shift-picker dropdown anchored to the given cell element.
   * @param {string} empId
   * @param {string} date
   * @param {HTMLElement} anchorEl
   */
  function openCellEditor(empId, date, anchorEl) {
    const emp = appState.employees.find(e => e.id === empId);
    if (!emp) return;

    const dropdown = document.getElementById('cell-dropdown');

    // Remove previous outside-click listener.
    if (_dropdownCloseHandler) {
      document.removeEventListener('click', _dropdownCloseHandler);
      _dropdownCloseHandler = null;
    }

    dropdown.innerHTML = '';

    // Header.
    const header       = document.createElement('div');
    header.className   = 'px-3 py-2 text-xs font-medium text-gray-300 border-b border-gray-700 bg-gray-900';
    header.textContent = `${emp.name} — ${formatDate(date)}`;
    dropdown.appendChild(header);

    // Shift options: only shift codes this employee is allowed to work + OFF.
    const curA    = appState.assignments.find(a => a.date === date && a.employeeId === empId);
    const options = [...emp.allowedShiftTypes, 'OFF'];

    for (const code of options) {
      const btn     = document.createElement('button');
      btn.className = [
        'w-full text-left px-3 py-1.5 text-xs flex items-center gap-2 transition-colors',
        curA?.shiftCode === code ? 'bg-gray-700' : 'hover:bg-gray-700',
      ].join(' ');

      // Colour dot.
      const dot   = document.createElement('span');
      dot.style.cssText = 'width:9px;height:9px;border-radius:50%;display:inline-block;flex-shrink:0';
      if (code === 'OFF') {
        dot.style.background = '#1d4ed8';
      } else {
        const sc = SHIFT_COLORS[code];
        dot.style.background = sc ? sc.bg : '#555';
        dot.style.border     = `1px solid ${sc ? sc.text : '#888'}`;
      }

      // Label.
      const sc  = SHIFT_COLORS[code];
      const lbl = document.createElement('span');
      lbl.textContent = code === 'OFF'
        ? 'OFF — Day Off'
        : `${code}${sc ? ' — ' + sc.desc : ''}`;

      btn.appendChild(dot);
      btn.appendChild(lbl);
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        updateAssignment(empId, date, code);
        closeCellDropdown();
      });
      dropdown.appendChild(btn);
    }

    // Position near the anchor cell, clamped to viewport.
    const rect  = anchorEl.getBoundingClientRect();
    const ddW   = 214;
    const ddH   = options.length * 28 + 38;
    let   left  = rect.left;
    let   top   = rect.bottom + 2;
    if (left + ddW > window.innerWidth  - 8) left = window.innerWidth  - ddW - 8;
    if (top  + ddH > window.innerHeight - 8) top  = rect.top - ddH - 2;

    dropdown.style.left = `${Math.max(4, left)}px`;
    dropdown.style.top  = `${Math.max(4, top)}px`;
    dropdown.classList.remove('hidden');

    // Close on outside click.
    _dropdownCloseHandler = (e) => {
      if (!dropdown.contains(e.target)) closeCellDropdown();
    };
    setTimeout(() => document.addEventListener('click', _dropdownCloseHandler), 0);
  }

  function closeCellDropdown() {
    document.getElementById('cell-dropdown').classList.add('hidden');
    if (_dropdownCloseHandler) {
      document.removeEventListener('click', _dropdownCloseHandler);
      _dropdownCloseHandler = null;
    }
  }

  /**
   * Mutate a single assignment in appState and re-render grid + workload.
   * @param {string} empId
   * @param {string} date
   * @param {string} shiftCode
   */
  function updateAssignment(empId, date, shiftCode) {
    const idx = appState.assignments.findIndex(a => a.date === date && a.employeeId === empId);
    if (idx >= 0) {
      appState.assignments[idx] = { ...appState.assignments[idx], shiftCode, isFixed: false };
    } else {
      appState.assignments.push({ date, employeeId: empId, shiftCode, isFixed: false });
    }
    renderGrid();
    renderWorkloadSummary();
  }

  // ── Violation / status panel ─────────────────────────────────────────────────

  /**
   * Render the violation / success panel below the grid.
   * Distinguishes HARD VIOLATION (red), DEMAND (orange), SOFT WARNING (yellow),
   * and the all-clear green state.
   * @param {string[]} violations
   */
  function renderViolations(violations) {
    const panel = document.getElementById('violation-panel');

    if (!violations || violations.length === 0) {
      panel.className  = 'shrink-0 border-t border-gray-800 px-5 py-2 bg-green-950/50 flex items-center gap-2';
      panel.innerHTML  = `
        <span class="text-green-400 text-sm">✓</span>
        <span class="text-xs text-green-400 font-medium">All constraints satisfied — no violations</span>`;
      panel.classList.remove('hidden');
      return;
    }

    const hardCount = violations.filter(v => v.startsWith('HARD VIOLATION')).length;
    const demandCount = violations.filter(v => v.startsWith('DEMAND')).length;
    const softCount = violations.filter(v => v.startsWith('SOFT WARNING')).length;

    panel.className = 'shrink-0 border-t border-gray-800 px-5 py-3 bg-red-950/60';
    panel.classList.remove('hidden');

    const header = document.createElement('div');
    header.className = 'flex items-center gap-2 mb-2';
    header.innerHTML = `
      <span class="text-red-400">⚠</span>
      <span class="text-xs font-semibold text-red-300">
        ${[
          hardCount   ? `${hardCount} hard violation${hardCount   > 1 ? 's' : ''}` : '',
          demandCount ? `${demandCount} unmet demand${demandCount > 1 ? 's' : ''}` : '',
          softCount   ? `${softCount} soft warning${softCount   > 1 ? 's' : ''}` : '',
        ].filter(Boolean).join(' · ')}
      </span>`;
    panel.innerHTML = '';
    panel.appendChild(header);

    const list = document.createElement('div');
    list.className = 'space-y-0.5 max-h-24 overflow-y-auto';

    for (const v of violations) {
      const item = document.createElement('div');
      const isHard   = v.startsWith('HARD VIOLATION');
      const isSoft   = v.startsWith('SOFT WARNING');
      item.className = `text-xs font-mono ${isHard ? 'text-red-300' : isSoft ? 'text-yellow-400' : 'text-orange-300'}`;
      item.textContent = v;
      list.appendChild(item);
    }

    panel.appendChild(list);
  }

          <span class="text-xs text-gray-300 leading-tight">${emp.name}</span>
          <div class="flex items-baseline gap-1">
            <span class="text-sm font-bold font-mono text-slate-400">${ws.assigned}</span>
            <span class="text-xs text-gray-600">shifts</span>

          <div class="w-full h-1 bg-gray-700 rounded-full overflow-hidden">

          </div>
          <span class="text-xs text-gray-500">manager</span>`;

          <span class="text-xs text-gray-300 leading-tight">${emp.name}</span>

            <span class="text-sm font-bold font-mono" style="color:${color}">${ws.assigned}</span>

          <span class="text-xs font-mono" style="color:${color}">${pct}%</span>`;

      list.appendChild(card);

  function renderFteConfig() {

  // ── Date range initialisation ─────────────────────────────────────────────────

  function initDateRange() {
    // Default: next Monday through 4 weeks later (Mon–Sun).
    const today    = new Date();
    const dow      = today.getDay();
    const daysToMon = (8 - dow) % 7 || 7;
    const start    = new Date(today);
    start.setDate(today.getDate() + daysToMon);
    const end      = new Date(start);
    end.setDate(start.getDate() + 27);

    document.getElementById('range-start').value = start.toISOString().slice(0, 10);
    document.getElementById('range-end').value   = end.toISOString().slice(0, 10);
  }

  /**
   * Read the demand input fields and build a dailyDemand map keyed by ISO date.
   * Weekday rows use weekday inputs; weekend (Sat/Sun) rows use weekend inputs.
   *
   * @param {string[]} dates
   * @returns {Object.<string,Object.<string,number>>}
   */
  function buildDailyDemand(dates) {
    const demand = {};
    for (const date of dates) {
      const d    = new Date(date + 'T12:00:00Z');
      const dow  = d.getUTCDay();
      const isWE = dow === 0 || dow === 6;
      const day  = {};
      for (const code of DEMAND_SHIFT_CODES) {
        const inputId = isWE ? `demand-we-${code}` : `demand-wd-${code}`;
        const el      = document.getElementById(inputId);
        const val     = el ? (parseInt(el.value, 10) || 0) : 0;
        if (val > 0) day[code] = val;
      }
      demand[date] = day;
    }
    return demand;
  }

  // ── Event handlers ────────────────────────────────────────────────────────────

  async function handleFileUpload(e) {
    const file = e.target.files[0];
    if (!file) return;
    e.target.value = ''; // Allow re-importing the same file.

    showToast('Parsing workbook…');

    try {
      const result = await parseWorkbook(file);

      // Merge imported employees with DEFAULT_EMPLOYEES defaults for anyone not in the file.
      const merged = result.employees.length > 0 ? result.employees
        : DEFAULT_EMPLOYEES.map(e => ({ ...e, fixedOffDates: [] }));

      appState.employees         = merged;
      appState.preAssignedOff    = result.preAssignedOff;
      appState.lockedAssignments = result.lockedAssignments;
      appState.dates             = result.detectedDates;
      appState.assignments       = [...result.lockedAssignments];
      appState.violations        = [];
      appState.workloadSummary   = {};

      // Sync date range inputs.
      if (result.detectedDates.length > 0) {
        document.getElementById('range-start').value = result.detectedDates[0];
        document.getElementById('range-end').value   = result.detectedDates[result.detectedDates.length - 1];
      }

      renderFteConfig();
      renderGrid();
      renderViolations([]);
      renderWorkloadSummary();

      showToast(
        `Imported ${result.employees.length} employees · ${result.detectedDates.length} dates · ${result.lockedAssignments.length} locked cells`,
        'success',
      );
    } catch (err) {
      showToast(`Import failed: ${err.message}`, 'error');
      console.error('[NSL Scheduler] parseWorkbook error:', err);
    }
  }

  function handleGenerateClick() {
    const startVal = document.getElementById('range-start').value;
    const endVal   = document.getElementById('range-end').value;

    if (!startVal || !endVal) {
      showToast('Please set a start and end date first', 'error');
      return;
    }

    const dates = getDatesInRange(startVal, endVal);
    if (dates.length === 0) {
      showToast('Start date must be before end date', 'error');
      return;
    }
    if (dates.length > 366) {
      showToast('Schedule range must not exceed 1 year', 'error');
      return;
    }

    const targetShifts = parseInt(document.getElementById('target-shifts').value, 10) || 5;
    const dailyDemand  = buildDailyDemand(dates);

    // Sync FTE from left-panel inputs in case the user edited them.
    for (const emp of appState.employees) {
      const input = document.getElementById(`fte-${emp.id}`);
      if (input) {
        const v = parseFloat(input.value);
        if (!isNaN(v) && v > 0) emp.fte = v;
      }
    }

    try {
      const output = generateSchedule({
        employees:              appState.employees,
        dates,
        dailyDemand,
        preAssignedOff:         appState.preAssignedOff,
        lockedAssignments:      appState.lockedAssignments,
        targetShiftsPerWeekFor1FTE: targetShifts,
      });

      appState.dates           = dates;
      appState.assignments     = output.assignments;
      appState.violations      = output.violations;
      appState.workloadSummary = output.workloadSummary;

      renderGrid();
      renderViolations(output.violations);
      renderWorkloadSummary();

      const shiftCount = output.assignments.filter(a => a.shiftCode !== 'OFF').length;
      const msg = output.violations.length === 0
        ? `Schedule generated — ${dates.length} days, ${shiftCount} shifts assigned`
        : `Schedule generated with ${output.violations.length} violation(s) — review below`;

      showToast(msg, output.violations.length === 0 ? 'success' : 'error');
    } catch (err) {
      showToast(`Schedule generation error: ${err.message}`, 'error');
      console.error('[NSL Scheduler] generateSchedule error:', err);
    }
  }

  async function handleExport() {
    if (appState.assignments.length === 0 || appState.dates.length === 0) {
      showToast('Nothing to export — generate a schedule first', 'error');
      return;
    }
    showToast('Generating Excel file…');
    try {
      await exportWorkbook(appState.assignments, appState.employees, appState.dates);
      showToast('Export complete — file download started', 'success');
    } catch (err) {
      showToast(`Export failed: ${err.message}`, 'error');
      console.error('[NSL Scheduler] exportWorkbook error:', err);
    }
  }

      showToast('ExcelJS did not load — import/export features unavailable. Check network.', 'error');
    }
  });
